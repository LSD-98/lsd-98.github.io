[build]
  command = "hugo --gc --minify -b $URL && npx pagefind --source 'public'"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.152.1"
  HUGO_ENABLEGITINFO = "true"
  # SMTP_USER is a public login that appears inside the public email address.
  # SMTP_FROM is the public sender address. Keep SMTP_PASS scanned.
  SECRETS_SCAN_OMIT_KEYS = "SMTP_USER,SMTP_FROM"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL && npx pagefind --source 'public'"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL && npx pagefind --source 'public'"

[functions]
  # Bundle PDFs and the Hugo flag read by the report download functions.
  # The report remains inaccessible unless report_downloads.enabled is true.
  included_files = ["netlify/functions/assets/**", "config/_default/params.yaml", "data/soutenance.json"]
  node_bundler = "esbuild"

[[plugins]]
  package = "netlify-plugin-hugo-cache-resources"
  [plugins.inputs]
    debug = true
